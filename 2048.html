<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
  :root {
    --bg: #faf8ef;
    --board-bg: #bbada0;
    --cell-bg: #cdc1b4;
    --text-dark: #776e65;
    --text-light: #f9f6f2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text-dark);
  }
  .wrap { width: 420px; max-width: 92vw; }
  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
  h1 { font-size: 48px; margin: 0; color: var(--text-dark); }
  .scores { display: flex; gap: 8px; }
  .score-box {
    background: var(--board-bg);
    color: var(--text-light);
    border-radius: 6px;
    padding: 8px 16px;
    text-align: center;
    min-width: 70px;
  }
  .score-box .label { font-size: 11px; text-transform: uppercase; opacity: .8; }
  .score-box .value { font-size: 20px; font-weight: bold; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .msg { font-size: 14px; color: var(--text-dark); }
  button#new-game {
    background: #8f7a66;
    color: var(--text-light);
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
  }
  button#new-game:hover { background: #9f8b76; }
  .board {
    position: relative;
    background: var(--board-bg);
    border-radius: 8px;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 8px;
    aspect-ratio: 1 / 1;
    touch-action: none;
    user-select: none;
  }
  .cell-bg {
    background: var(--cell-bg);
    border-radius: 6px;
  }
  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-weight: bold;
    transition: top 0.1s ease, left 0.1s ease;
    color: var(--text-dark);
  }
  .overlay {
    position: absolute;
    inset: 8px;
    background: rgba(238, 228, 218, 0.73);
    border-radius: 8px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    gap: 12px;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .overlay button {
    background: #8f7a66;
    color: var(--text-light);
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }
  footer { margin-top: 14px; font-size: 13px; text-align: center; color: var(--text-dark); opacity: .75; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </header>
  <div class="toolbar">
    <div class="msg">Use arrow keys or swipe to combine tiles.</div>
    <button id="new-game">New Game</button>
  </div>
  <div class="board" id="board">
    <div class="overlay" id="overlay">
      <div id="overlay-text">Game Over</div>
      <button id="overlay-btn">Try Again</button>
    </div>
  </div>
  <footer>Reach the 2048 tile to win. Keep going after for a higher score.</footer>
</div>

<script>
(function () {
  const SIZE = 4;
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlayEl = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');
  const overlayBtn = document.getElementById('overlay-btn');
  const newGameBtn = document.getElementById('new-game');

  let grid, score, best, won, over;

  const tileColors = {
    2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
    32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
    512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'
  };

  function loadBest() {
    try { return parseInt(localStorage.getItem('game2048_best') || '0', 10); }
    catch (e) { return 0; }
  }
  function saveBest(v) {
    try { localStorage.setItem('game2048_best', String(v)); } catch (e) {}
  }

  function init() {
    grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    score = 0;
    won = false;
    over = false;
    best = loadBest();
    updateScores();
    overlayEl.classList.remove('show');
    addRandomTile();
    addRandomTile();
    render();
  }

  function addRandomTile() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 0) empty.push([r, c]);
    if (empty.length === 0) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function updateScores() {
    scoreEl.textContent = score;
    if (score > best) { best = score; saveBest(best); }
    bestEl.textContent = best;
  }

  function render() {
    boardEl.querySelectorAll('.tile, .cell-bg').forEach(el => el.remove());
    const cellSize = boardEl.clientWidth;
    const gap = 8, pad = 8;
    const inner = (cellSize - pad * 2 - gap * 3) / 4;

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const bg = document.createElement('div');
        bg.className = 'cell-bg';
        bg.style.gridRowStart = r + 1;
        bg.style.gridColumnStart = c + 1;
        boardEl.appendChild(bg);
      }
    }

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = grid[r][c];
        if (!v) continue;
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.textContent = v;
        const size = v > 512 ? (v > 8192 ? 16 : 20) : 28;
        tile.style.fontSize = size + 'px';
        tile.style.width = inner + 'px';
        tile.style.height = inner + 'px';
        tile.style.left = (pad + c * (inner + gap)) + 'px';
        tile.style.top = (pad + r * (inner + gap)) + 'px';
        tile.style.background = tileColors[v] || '#3c3a32';
        tile.style.color = v <= 4 ? '#776e65' : '#f9f6f2';
        boardEl.appendChild(tile);
      }
    }
  }

  function cloneGrid(g) { return g.map(row => row.slice()); }
  function gridsEqual(a, b) {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (a[r][c] !== b[r][c]) return false;
    return true;
  }

  function slideAndMergeLine(line) {
    let arr = line.filter(v => v !== 0);
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1]) {
        arr[i] *= 2;
        score += arr[i];
        if (arr[i] === 2048) won = true;
        arr.splice(i + 1, 1);
      }
    }
    while (arr.length < SIZE) arr.push(0);
    return arr;
  }

  function move(dir) {
    if (over) return;
    const before = cloneGrid(grid);

    for (let i = 0; i < 4; i++) {
      let line;
      if (dir === 'left') {
        grid[i] = slideAndMergeLine(grid[i]);
      } else if (dir === 'right') {
        line = grid[i].slice().reverse();
        line = slideAndMergeLine(line);
        grid[i] = line.reverse();
      } else if (dir === 'up') {
        line = [grid[0][i], grid[1][i], grid[2][i], grid[3][i]];
        line = slideAndMergeLine(line);
        for (let r = 0; r < SIZE; r++) grid[r][i] = line[r];
      } else if (dir === 'down') {
        line = [grid[3][i], grid[2][i], grid[1][i], grid[0][i]];
        line = slideAndMergeLine(line);
        for (let r = 0; r < SIZE; r++) grid[3 - r][i] = line[r];
      }
    }

    const moved = !gridsEqual(before, grid);
    if (moved) {
      addRandomTile();
      updateScores();
      render();
      if (won) {
        showOverlay('You reached 2048! Keep playing or start over.');
        won = false; // don't nag every move
      } else if (!hasMoves()) {
        over = true;
        showOverlay('Game Over');
      }
    }
  }

  function hasMoves() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === 0) return true;
        if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
        if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
      }
    return false;
  }

  function showOverlay(text) {
    overlayText.textContent = text;
    overlayEl.classList.add('show');
  }

  document.addEventListener('keydown', (e) => {
    const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  let touchStartX = 0, touchStartY = 0;
  boardEl.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  boardEl.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
  }, { passive: true });

  newGameBtn.addEventListener('click', init);
  overlayBtn.addEventListener('click', init);
  window.addEventListener('resize', render);

  init();
})();
</script>
</body>
</html>
